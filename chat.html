<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>Vexo Chat</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<h1>💬 Chat</h1>

<div id="chatBox" style="height:300px;overflow:auto;background:#111;padding:10px;border-radius:10px;"></div>

<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>

<script>

let current = JSON.parse(localStorage.getItem("vexo_current"));
let messages = JSON.parse(localStorage.getItem("vexo_chat")) || [];

let box = document.getElementById("chatBox");

function render(){

box.innerHTML = "";

messages.forEach(m=>{
box.innerHTML += `
<p><b>@${m.user}:</b> ${m.text}</p>
`;
});

}

function sendMsg(){

let text = document.getElementById("msg").value;

if(text === "") return;

messages.push({
user: current.username,
text: text,
time: Date.now()
});

localStorage.setItem("vexo_chat", JSON.stringify(messages));

document.getElementById("msg").value = "";

render();

// 🔔 notification
let notis = JSON.parse(localStorage.getItem("vexo_notifications")) || [];
notis.push({text:`New message from @${current.username}`});
localStorage.setItem("vexo_notifications", JSON.stringify(notis));

}

render();

</script>

</body>
</html>
<link rel="manifest" href="manifest.json">
