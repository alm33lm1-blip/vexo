<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>Vexo Verification</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>


<div class="verification-box">


<h1>
Vexo Verification
</h1>


<p>
Get the official Vexo badge
</p>



<div class="card">


<h2>
✓ Verified Account
</h2>


<p>
- حماية الحساب
</p>


<p>
- علامة V بجانب الاسم
</p>


<p>
- ظهور أفضل في البحث
</p>


<p>
- مميزات خاصة للمبدعين
</p>


</div>




<button onclick="verifyAccount()">

Get Verified

</button>



</div>






<script>


function verifyAccount(){



let user = JSON.parse(

localStorage.getItem("vexo_current")

);



if(!user){

alert("Login first");

return;

}





user.verified = true;





localStorage.setItem(

"vexo_current",

JSON.stringify(user)

);






let users = JSON.parse(

localStorage.getItem("vexo_users")

) || [];





let index = users.findIndex(

u => u.id === user.id

);





if(index !== -1){


users[index] = user;



localStorage.setItem(

"vexo_users",

JSON.stringify(users)

);


}





alert("Your account is verified");



window.location.href="profile.html";



}



</script>


</body>
