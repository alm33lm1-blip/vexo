<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>Clan Wars</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<h1>👥 Clan Wars</h1>

<div id="clanBox"></div>

<script>

let clans = JSON.parse(localStorage.getItem("vexo_clans")) || [
{name:"Alpha", points:100},
{name:"Beta", points:80},
{name:"Omega", points:60}
];

function render(){

let box = document.getElementById("clanBox");
box.innerHTML = "";

clans.sort((a,b)=>b.points-a.points);

clans.forEach(c=>{
box.innerHTML += `
<div style="background:#111;margin:10px;padding:10px;border-radius:10px;">
<h3>${c.name}</h3>
<p>Points: ${c.points}</p>

<button onclick="fight('${c.name}')">⚔️ Fight</button>
</div>
`;
});

}

function fight(name){

let clan = clans.find(c=>c.name === name);

let win = Math.random() > 0.5;

if(win){
clan.points += 20;
alert("Win! +20 points");
}else{
clan.points -= 10;
alert("Lose! -10 points");
}

localStorage.setItem("vexo_clans", JSON.stringify(clans));

render();

}

render();

</script>

</body>
</html>
<link rel="manifest" href="manifest.json">
