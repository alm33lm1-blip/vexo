<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>Vexo Stories</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<button onclick="goBack()" style="
position:fixed;
top:15px;
left:15px;
background:#111;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
z-index:999;
">←</button>

<h1>📸 Stories</h1>

<!-- ➕ ADD STORY -->
<div style="margin:20px;">
<input type="text" id="storyText" placeholder="Write story text">
<br><br>
<button onclick="addStory()">Add Story</button>
</div>

<!-- 🔥 STORIES LIST -->
<div id="storiesList"></div>

<!-- 📖 FULL VIEW -->
<div id="storyView" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:white;
justify-content:center;
align-items:center;
flex-direction:column;
">

<h2 id="storyUser"></h2>
<p id="storyContent"></p>

<button onclick="closeStory()">Close</button>

</div>

<script>

let user = JSON.parse(localStorage.getItem("vexo_current"));
let stories = JSON.parse(localStorage.getItem("vexo_stories")) || [];

// ================= BACK =================
function goBack(){
if(document.referrer){
history.back();
}else{
location.href="home.html";
}
}

// ================= ADD STORY =================
function addStory(){

let text = document.getElementById("storyText").value;

if(text === ""){
alert("Write something");
return;
}

let story = {
id: Date.now(),
userId: user.id,
username: user.username,
text: text,
time: Date.now()
};

stories.push(story);

localStorage.setItem("vexo_stories", JSON.stringify(stories));

alert("Story Added 🔥");

location.reload();

}

// ================= FILTER STORIES (24h) =================
function getActiveStories(){

let now = Date.now();

return stories.filter(s => now - s.time < 24 * 60 * 60 * 1000);

}

// ================= RENDER =================
let list = document.getElementById("storiesList");

getActiveStories().forEach(s=>{

list.innerHTML += `
<div style="background:#111;margin:10px;padding:10px;border-radius:10px;cursor:pointer;"
onclick="openStory('${s.username}','${s.text}')">

📸 @${s.username}

</div>
`;

});

// ================= OPEN STORY =================
function openStory(user,text){

document.getElementById("storyUser").innerText = "@" + user;
document.getElementById("storyContent").innerText = text;

document.getElementById("storyView").style.display = "flex";

}

// ================= CLOSE =================
function closeStory(){
document.getElementById("storyView").style.display = "none";
}

</script>

</body>
</html>
<link rel="manifest" href="manifest.json">
