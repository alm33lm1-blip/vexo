<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>Settings</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<h1 id="title">⚙️ Settings</h1>

<!-- 🌐 LANGUAGE -->
<h2 id="langText">Language</h2>

<select id="language" onchange="changeLanguage()">
<option value="ar">العربية</option>
<option value="en">English</option>
</select>

<hr>

<!-- 👥 CLOSE FRIENDS -->
<h2 id="friendsText">Close Friends</h2>

<div id="friendsList"></div>

<hr>

<button onclick="save()">Save</button>

<script>

let user = JSON.parse(localStorage.getItem("vexo_current"));
let users = JSON.parse(localStorage.getItem("vexo_users")) || [];

if(!user.closeFriends){
user.closeFriends = [];
}

// 🔥 اللغة
function changeLanguage(){

let lang = document.getElementById("language").value;

user.language = lang;

// 🔥 ترجمة فورية
if(lang === "ar"){
document.documentElement.dir = "rtl";
document.getElementById("title").innerText = "⚙️ الإعدادات";
document.getElementById("langText").innerText = "🌐 اللغة";
document.getElementById("friendsText").innerText = "👥 الأصدقاء المقربين";
}

if(lang === "en"){
document.documentElement.dir = "ltr";
document.getElementById("title").innerText = "⚙️ Settings";
document.getElementById("langText").innerText = "🌐 Language";
document.getElementById("friendsText").innerText = "👥 Close Friends";
}

}

// 🔥 عرض الأصدقاء
let box = document.getElementById("friendsList");

users.forEach(u=>{

if(u.id !== user.id){

box.innerHTML += `
<div style="background:#111;margin:10px;padding:10px;border-radius:10px;">
<p>@${u.username}</p>
<button onclick="toggle(${u.id})">
${user.closeFriends.includes(u.id) ? "Remove" : "Add"}
</button>
</div>
`;

}

});

// 🔥 إضافة/حذف
function toggle(id){

if(user.closeFriends.includes(id)){
user.closeFriends = user.closeFriends.filter(x=>x!==id);
}else{
user.closeFriends.push(id);
}

location.reload();

}

// 🔥 حفظ
function save(){

localStorage.setItem("vexo_current", JSON.stringify(user));

let index = users.findIndex(u=>u.id===user.id);

if(index !== -1){
users[index] = user;
localStorage.setItem("vexo_users", JSON.stringify(users));
}

alert("Saved");

}

// 🔥 تحميل اللغة عند الدخول
document.getElementById("language").value = user.language || "ar";
changeLanguage();

</script>

</body>

border-radius:10px;
font-size:18px;
z-index:999;
">
←
</button>
</html>
