<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>Clans</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<h1>👥 Clans</h1>

<input id="clanName" placeholder="Clan Name">
<button onclick="createClan()">Create Clan</button>

<h2>Your Clan</h2>
<div id="myClan"></div>

<h2>Join Requests</h2>
<div id="requests"></div>

<h2>Clan Battles ⚔️</h2>
<div id="battles"></div>

<h2>All Clans</h2>
<div id="allClans"></div>

<script src="../data/xp-system.js"></script>

<script>

let user = JSON.parse(localStorage.getItem("vexo_current"));
let clans = JSON.parse(localStorage.getItem("vexo_clans")) || [];
let battles = JSON.parse(localStorage.getItem("vexo_battles")) || [];

// ================= CREATE =================
function createClan(){

let name = document.getElementById("clanName").value;

if(!name) return alert("Enter name");

let clan = {
id: Date.now(),
name:name,
owner:user.id,
members:[user.id],
level:1,
xp:0,
requests:[],
points:0
};

clans.push(clan);

localStorage.setItem("vexo_clans", JSON.stringify(clans));

alert("Clan Created");
location.reload();
}

// ================= JOIN =================
function joinClan(id){

let clan = clans.find(c=>c.id===id);

if(clan.members.includes(user.id)){
alert("Already in clan");
return;
}

if(!clan.requests.includes(user.id)){
clan.requests.push(user.id);
}

localStorage.setItem("vexo_clans", JSON.stringify(clans));

alert("Request Sent");
}

// ================= ACCEPT =================
function acceptRequest(cid, uid){

let clan = clans.find(c=>c.id===cid);

clan.members.push(uid);

clan.requests = clan.requests.filter(x=>x!==uid);

localStorage.setItem("vexo_clans", JSON.stringify(clans));

location.reload();
}

// ================= REJECT =================
function rejectRequest(cid, uid){

let clan = clans.find(c=>c.id===cid);

clan.requests = clan.requests.filter(x=>x!==uid);

localStorage.setItem("vexo_clans", JSON.stringify(clans));

location.reload();
}

// ================= KICK =================
function kickMember(cid, uid){

let clan = clans.find(c=>c.id===cid);

clan.members = clan.members.filter(x=>x!==uid);

localStorage.setItem("vexo_clans", JSON.stringify(clans));

location.reload();
}

// ================= ADD XP =================
function addClanXP(cid, amount){

let clan = clans.find(c=>c.id===cid);

clan.xp += amount;

let need = clan.level * 200;

if(clan.xp >= need){
clan.level++;
clan.xp = 0;
alert("🔥 Clan Level Up!");
}

localStorage.setItem("vexo_clans", JSON.stringify(clans));
location.reload();
}

// ================= BATTLE =================
function startBattle(cid){

let myClan = clans.find(c=>c.members.includes(user.id));
let enemy = clans.find(c=>c.id===cid);

if(!myClan) return alert("You need clan");

let battle = {
id: Date.now(),
clan1: myClan.id,
clan2: enemy.id,
score1:0,
score2:0
};

battles.push(battle);

localStorage.setItem("vexo_battles", JSON.stringify(battles));

alert("Battle Started!");
location.reload();
}

// ================= SUPPORT =================
function supportBattle(bid){

let battle = battles.find(b=>b.id===bid);

let myClan = clans.find(c=>c.members.includes(user.id));

if(myClan.id === battle.clan1){
battle.score1 += 10;
}else{
battle.score2 += 10;
}

addCoins(-5);

localStorage.setItem("vexo_battles", JSON.stringify(battles));

location.reload();
}

// ================= RENDER =================
function render(){

let myClan = clans.find(c=>c.members.includes(user.id));

// 🔥 MY CLAN
if(myClan){

document.getElementById("myClan").innerHTML = `
<h3>${myClan.name}</h3>
<p>Level: ${myClan.level}</p>
<p>XP: ${myClan.xp}</p>
<p>Points: ${myClan.points}</p>
<button onclick="addClanXP(${myClan.id},50)">+XP</button>
`;

// 🔥 REQUESTS
if(myClan.owner === user.id){

myClan.requests.forEach(r=>{

document.getElementById("requests").innerHTML += `
<div>
User: ${r}
<button onclick="acceptRequest(${myClan.id},${r})">✔️</button>
<button onclick="rejectRequest(${myClan.id},${r})">❌</button>
</div>
`;

});
}

// 🔥 MEMBERS
let membersHTML = "<h3>Members</h3>";

myClan.members.forEach(m=>{

membersHTML += `
<div>
User: ${m}
${myClan.owner===user.id && m!==user.id ? `<button onclick="kickMember(${myClan.id},${m})">Kick</button>` : ""}
</div>
`;

});

document.getElementById("myClan").innerHTML += membersHTML;
}

// 🔥 ALL CLANS
clans.forEach(c=>{

document.getElementById("allClans").innerHTML += `
<div style="background:#111;margin:10px;padding:10px;">
<h3>${c.name}</h3>
<p>Level: ${c.level}</p>
<p>Members: ${c.members.length}</p>
<button onclick="joinClan(${c.id})">Join</button>
<button onclick="startBattle(${c.id})">⚔️ Challenge</button>
</div>
`;

});

// 🔥 BATTLES
battles.forEach(b=>{

document.getElementById("battles").innerHTML += `
<div style="background:#222;margin:10px;padding:10px;">
<p>${b.clan1} vs ${b.clan2}</p>
<p>${b.score1} - ${b.score2}</p>
<button onclick="supportBattle(${b.id})">Support (5 coins)</button>
</div>
`;

});

}

render();

</script>

</body>
<button onclick="goBack()" style="
position:fixed;
top:15px;
left:15px;
background:#111;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
font-size:18px;
z-index:999;
">
←
</button>
</html>
