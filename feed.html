<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>Vexo Feed</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<button onclick="goBack()" style="
position:fixed;
top:15px;
left:15px;
background:#111;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
z-index:999;
">←</button>

<h1>🔥 For You</h1>

<div id="feed"></div>

<script src="../data/xp-system.js"></script>

<script>

let currentUser = JSON.parse(localStorage.getItem("vexo_current"));
let users = JSON.parse(localStorage.getItem("vexo_users")) || [];
let sparks = JSON.parse(localStorage.getItem("vexo_sparks")) || [];

// ================= BACK =================
function goBack(){
if(document.referrer){
history.back();
}else{
location.href="home.html";
}
}

// ================= SCORE SYSTEM =================
// كل spark له score حسب:
function getScore(s){

return (
(s.likes || 0) * 2 +
(s.comments || 0) * 3 +
Math.random() * 5 // تنويع عشان يصير ديناميكي
);

}

// ================= SORT SPARKS =================
let sortedSparks = sparks
.sort((a,b)=> getScore(b) - getScore(a))
.slice(0,20);

// ================= USERS SUGGESTION =================
let suggestedUsers = users
.filter(u=>u.id !== currentUser?.id)
.sort((a,b)=> (b.followers||0) - (a.followers||0))
.slice(0,10);

// ================= RENDER =================
let feed = document.getElementById("feed");

feed.innerHTML = "";

// 🔥 SPARKS FIRST
sortedSparks.forEach(s=>{

feed.innerHTML += `
<div class="spark-card">

<h3>@${s.username}</h3>

<div style="background:#111;border-radius:10px;padding:10px;margin:10px 0;">
🎥 ${s.title || "Spark"}
</div>

<button onclick="like(${s.id})">❤️ ${s.likes || 0}</button>

</div>
`;

});

// 👤 USERS SUGGESTION
feed.innerHTML += "<h2>👤 Suggested Users</h2>";

suggestedUsers.forEach(u=>{

feed.innerHTML += `
<div style="background:#111;margin:10px;padding:10px;border-radius:10px;">
<h3>${u.name}</h3>
<p>@${u.username}</p>
<button onclick="follow(${u.id})">Follow</button>
</div>
`;

});

// ================= LIKE =================
function like(id){

let spark = sparks.find(s=>s.id === id);

if(spark){
spark.likes = (spark.likes || 0) + 1;

localStorage.setItem("vexo_sparks", JSON.stringify(sparks));

addXP(5);

location.reload();
}

}

// ================= FOLLOW =================
function follow(id){

let me = users.find(u=>u.id === currentUser.id);
let target = users.find(u=>u.id === id);

if(!me.followingList) me.followingList = [];

if(!me.followingList.includes(id)){
me.followingList.push(id);
me.following = (me.following || 0) + 1;
target.followers = (target.followers || 0) + 1;
}

localStorage.setItem("vexo_users", JSON.stringify(users));
localStorage.setItem("vexo_current", JSON.stringify(me));

alert("Followed 🔥");
location.reload();

}

</script>

</body>
</html>
<link rel="manifest" href="manifest.json">
