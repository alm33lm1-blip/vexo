<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>Create Spark</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<h1>Create Spark 🎥</h1>

<input id="title" placeholder="Title">

<br><br>

<input type="file" id="videoInput" accept="video/*">

<br><br>

<button onclick="createSpark()">Publish</button>

<script src="../data/xp-system.js"></script>

<script>

function createSpark(){

let user = JSON.parse(localStorage.getItem("vexo_current"));

if(!user){
alert("Login first");
return;
}

let title = document.getElementById("title").value;
let file = document.getElementById("videoInput").files[0];

if(!file){
alert("Choose video");
return;
}

// 🔥 تحويل الفيديو لرابط
let videoURL = URL.createObjectURL(file);

let sparks = JSON.parse(localStorage.getItem("vexo_sparks")) || [];

let spark = {
id: Date.now(),
userId:user.id,
username:user.username,
title:title,
video:videoURL,
likes:0
};

sparks.push(spark);

localStorage.setItem("vexo_sparks", JSON.stringify(sparks));

user.sparks++;
localStorage.setItem("vexo_current", JSON.stringify(user));

addXP(25);

alert("🔥 Spark Published!");

window.location.href="home.html";

}

</script>

</body>

position:fixed;
top:15px;
left:15px;
background:#111;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
font-size:18px;
z-index:999;
">

</button>
